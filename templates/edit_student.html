{% extends "base.html" %} {% block title %}Edit Student - FRAMS{% endblock %} {%block content %}
<div class="hero fade-in">
  <h1>Edit Student Details</h1>
  <p>Update information for {{ student.name }}</p>
</div>

<div class="form-container glass fade-in" style="animation-delay: 0.1s">
  <form
    action="{% url 'update_student' student.registration_id %}"
    method="POST"
  >
    {% csrf_token %}

    <div class="form-group">
      <label>Registration ID</label>
      <div class="input-with-icon">
        <i class="fas fa-id-card"></i>
        <input
          type="text"
          name="registration_id"
          class="form-input"
          required
          value="{{ student.registration_id }}"
        />
      </div>
      <p
        style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem"
      >
        Changing this is not recommended if attendance logs exist.
      </p>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-with-icon">
        <i class="fas fa-user"></i>
        <input
          type="text"
          name="name"
          class="form-input"
          required
          value="{{ student.name }}"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Department</label>
      <div class="input-with-icon">
        <i class="fas fa-graduation-cap"></i>
        <input
          type="text"
          name="dept"
          class="form-input"
          required
          value="{{ student.dept|default:'' }}"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Address</label>
      <div class="input-with-icon">
        <i class="fas fa-map-marker-alt"></i>
        <textarea
          name="address"
          class="form-input"
          style="height: 80px; padding-top: 0.75rem"
        >
{{ student.address|default:'' }}</textarea
        >
      </div>
    </div>

    <div class="form-group">
      <label>Assigned Staff</label>
      <select name="staff" class="form-input">
        <option value="">-- Select Staff --</option>
        {% for s in staffs %}
        <option
          value="{{ s.id }}"
          {%if student.staff.id == s.id %}selected{%endif%}
        >
          {{ s.name }} ({{ s.department }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div style="display: flex; gap: 1rem; margin-top: 2rem">
      <button type="submit" class="btn-submit" style="margin-top: 0">
        Save Changes
      </button>
      <a
        href="{% url 'student_data' %}"
        class="btn-submit"
        style="
          margin-top: 0;
          background: var(--secondary);
          text-align: center;
          line-height: 2.5rem;
          text-decoration: none;
        "
        >Cancel</a
      >
    </div>
  </form>
</div>
{% endblock %}
