{% extends "base.html" %}

{% block title %}Enroll New Student - FRAMS{% endblock %}

{% block content %}
<div class="hero fade-in">
    <h1>Student Enrollment</h1>
    <p>Please enter student details below to start the face capture process.</p>
</div>

<div class="form-container glass fade-in" style="animation-delay: 0.1s;">
    <form action="{% url 'enroll_step1' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Registration ID</label>
            <div class="input-with-icon">
                <i class="fas fa-id-card"></i>
                <input type="text" name="reg_id" class="form-input" required placeholder="e.g. 2024001">
            </div>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-with-icon">
                <i class="fas fa-user"></i>
                <input type="text" name="full_name" class="form-input" required placeholder="Enter student's full name">
            </div>
        </div>
        <div class="form-group">
            <label>Department</label>
            <div class="input-with-icon">
                <i class="fas fa-graduation-cap"></i>
                <input type="text" name="dept" class="form-input" required placeholder="e.g. Computer Science">
            </div>
        </div>
        <div class="form-group">
            <label>Address</label>
            <div class="input-with-icon">
                <i class="fas fa-map-marker-alt"></i>
                <textarea name="address" class="form-input" style="height: 100px; padding-top: 0.75rem;" placeholder="Enter student's address"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label>Assigned Staff</label>
            <select name="staff" class="form-input">
                <option value="">-- Select Staff --</option>
                {% for staff in staffs %}
                <option value="{{ staff.id }}">{{ staff.name }} ({{ staff.department }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="alert glass"
            style="font-size: 0.875rem; color: var(--text-muted); padding: 1rem; border-color: rgba(99, 102, 241, 0.3);">
            <i class="fas fa-info-circle" style="color: var(--primary); margin-right: 0.5rem;"></i>
            Clicking 'Next' will open the camera to capture a training image.
        </div>
        <button type="submit" class="btn-submit">Next: Capture Face</button>
    </form>
</div>
{% endblock %}
