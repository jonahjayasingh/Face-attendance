{% extends "base.html" %}

{% block title %}Success - FRAMS{% endblock %}

{% block content %}
<div class="hero fade-in">
    <div class="icon-wrapper" style="margin: 0 auto 2rem; background: rgba(16, 185, 129, 0.1); color: var(--accent);">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1>{{ title|default:"Operation Successful" }}</h1>
    <p>{{ message|default:"The action was completed successfully." }}</p>

    <div style="margin-top: 3rem;">
        <a href="{{ url|default:'/' }}" class="btn-submit" style="padding: 0.75rem 2rem; text-decoration: none;">
            {{ link_text|default:"Back to Home" }}
        </a>
    </div>
</div>
{% endblock %}
