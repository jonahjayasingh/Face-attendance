{% extends "base.html" %}

{% block title %}Admin Registration - FRAMS{% endblock %}

{% block content %}
<div class="hero fade-in">
    <h1>Create Admin Account</h1>
    <p>Register to manage attendance records and student data.</p>
</div>

<div class="form-container glass fade-in" style="animation-delay: 0.1s;">
    <form action="/register" method="POST">
        <div class="form-group">
            <label>Username</label>
            <div class="input-with-icon">
                <i class="fas fa-id-badge"></i>
                <input type="text" name="username" class="form-input" required placeholder="Choose a username">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
                <i class="fas fa-shield-alt"></i>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
        </div>
        <button type="submit" class="btn-submit">Register Administrator</button>
    </form>

    <div style="margin-top: 2rem; text-align: center;">
        <p style="color: var(--text-muted); font-size: 0.875rem;">Already have an account? <a href="/login"
                style="color: var(--primary); text-decoration: none;">Login instead</a></p>
    </div>
</div>
{% endblock %}
